<!DOCTYPE html>
<html lang="ru">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="pages/index.css" rel="stylesheet">
        <title>Mesto</title>
    </head>
    <body class="root">
        <div class="page">
            <header class="header">
                <img src="images/logo.png" class="header__logo" alt="Логотип">
            </header>

            <main class="content">
             <section class="profile">
                <img src="./images/image.jpg" class="profile__avatar">
                <div class="profile__info">
                    <h1 class="profile__title">Жак-Ив Кусто</h1> 
                    <button class="profile__edit-button">
                            <img src="./images/edit-button.svg" class="profile__edit-vector" alt="Кнопка редактирования">
                    </button>
                    <p class="profile__subtitle">Исследователь океана</p>
                    
                </div>
                <button class="profile__add-button">
                    <img src="./images/add-button.svg" class="profile__button-vector">

                </button>
             </section>
            <section class="elements">
                <article class="element">
                        <img src="./images/by.jpg" class="element__image" alt="Ингушетия">
                        <div class="element__discription">
                        <p class="element__text">Ингушетия</p>  
                        <button class="element__button">
                            <img src="./images/like.svg" class="element__button-like" alt="Нравится">
                        </button>
                        </div>
                </article>
                <article class="element">
                        <img src="./images/dagestan.jpg" class="element__image" alt="Дагестан">
                        <div class="element__discription">
                            <p class="element__text">Дагестан</p>
                            <button class="element__button">
                                <img src="./images/like.svg" class="element__button-like" alt="Нравится">
                            </button>
                        </div>
                        
                </article>
                <article class="element">
                        <img src="./images/dombai.jpeg" class="element__image" alt="Домбай">
                        <div class="element__discription">
                            <p class="element__text">Домбай</p>
                            <button class="element__button">
                             <img src="./images/like.svg" class="element__button-like" alt="Нравится">   
                           </button>
                        </div>
                        
                </article>
                <article class="element">
                        <img src="./images/kuban.jpg" class="element__image" alt="Кубань">
                        <div class="element__discription">
                            <p class="element__text">Кубань</p>
                            <button class="element__button">
                                <img src="./images/like.svg" class="element__button-like" alt="Нравится">
                            </button>
                         </div>
                        
                </article>
                <article class="element">
                        <img src="./images/karachaevsk.png" class="element__image" alt="Карачаевск">
                        <div class="element__discription">
                            <p class="element__text">Карачаевск</p>
                            <button class="element__button">
                                <img src="./images/like.svg" class="element__button-like" alt="Нравится">
                           </button>
                        </div>
                        
                </article>
                <article class="element">
                        <img src="./images/albrus.jpg" class="element__image" alt="Эльбрус">
                        <div class="element__discription">
                            <p class="element__text">Эльбрус</p>
                            <button class="element__button">
                                <img src="./images/like.svg" class="element__button-like" alt="Нравится">
                            </button>
                        </div>
                       
                </article>
                
            </section>
            </main>
            <section class="popup">
                <div class="popup__container">
                    <button class="popup__button">
                         <img src="./images/close-icon.svg" alt="Кнопка закрытия окна" class="popup__close-icon">
                    </button>
                   
                    <form class="popup__form"  id="popup-form">
                            <fieldset class="popup__info-text">
                                    <h2 class="popup__heading">Редактировать профиль</h2>
                                    <input type="text" class="popup__name" placeholder="Имя" name="Имя" value="" id="your-name">
                                    <div class="popup__line"></div>
                                    <input type="text" class="popup__information" placeholder="О себе" name="О себе" value="" id="about-you">
                                    <div class="popup__line"></div>
                                    <button type="submit" class="popup__submit-button">Сохранить</button>
                                  </fieldset>
                                
                                </form>
                </div>
            </section>
        </div>
        <script src="./scripts/index.js">
        </script>
    </body>
            <footer class="footer">
                <p class="footer__info">© 2020 Mesto Russia</p>
            </footer>
 </html>

<!DOCTYPE html>
<html lang="ru">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="pages/index.css" rel="stylesheet">
        <title>Mesto</title>
    </head>
    <body class="root">
        <div class="page">
            <header class="header">
                <img src="images/logo.svg" class="header__logo" alt="Логотип">
            </header>

            <main class="content">
             <section class="profile">
               <div class="profile__all-information">
                   <img src="./images/image.jpg" class="profile__avatar" alt="аватарка профиля">
                    <div class="profile__info">
                        <h1 class="profile__title">Жак-Ив Кусто</h1> 
                        <button class="profile__edit-button" type="button" aria-label="Кнопка редактирования">
                        </button>
                        <p class="profile__subtitle">Исследователь океана</p> 
                     </div>
                 </div> 
                <button class="profile__add-button" type="button" aria-label="Кнопка добавить">
                </button>
             </section>
            <section class="elements">

                <template class="template">
                <article class="element">
                        <img src="" class="element__image" alt=" ">
                            <button class="element__button-delete" id="delete" type="button" aria-label="Удалить"></button>
                        <div class="element__description">
                        <h2 class="element__text"></h2>
                        <button class="element__button" type="button"  id="button-like" aria-label="Нравится">
                        </button>
                        </div>
                </article>
            </template>

            </section>
            </main>
         <footer class="footer">
             <p class="footer__info">© 2020 Mesto Russia</p>
         </footer>
         <popup class="popup">
                <form class="popup__form" name="Информация о пользователе">
                        <fieldset class="popup__info-text">
                                <button class="popup__close-icon" type="button" aria-label="Кнопка закрытия"></button>
                                <h2 class="popup__heading">Редактировать профиль</h2>
                                <input type="text" class="popup__information popup__information_type_name" placeholder="Имя" name="Имя" value="">
                                <input type="text" class="popup__information popup__information_type_job" placeholder="О себе" name="О себе" value="">
                                <button type="submit" class="popup__submit-button">Сохранить</button>
                              </fieldset>
                            </form>       
         </popup>
        <popup class="popup popup_card">
            <form class="popup__form">
                <fieldset class="popup__info-text">
                <button class="popup__close-icon popup__close-icon_card" type="button" aria-label="Кнопка закрытия добавления карточки"></button>
                <h2 class="popup__heading">Новое место</h2>
                <input type="text" class="popup__information popup__card-title" placeholder="Название">
                <input type="text" class="popup__information popup__card-image" placeholder="Ссылка на картинку">
                <button type="submit" class="popup__submit-button">Создать</button>
            </fieldset>
            </form>
        </popup>
        
        <popup class="popup popup_picture">
            <div class="popup__wrapper">
                <img src=" " class="popup__image" alt="Описание">
                <button class="popup__close-icon popup__close-icon_image"></button>
                <h2 class="popup__image-name"></h2>
            </div>

        </popup>
    </div>
        <script src="./scripts/index.js" defer>
        </script>
    </body>
 </html>

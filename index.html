<!DOCTYPE html>
<html lang="ru">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="pages/index.css" rel="stylesheet">
        <title>Mesto</title>
    </head>
    <body class="root">
        <div class="page">
            <header class="header">
                <img src="images/logo.svg" class="header__logo" alt="Логотип">
            </header>

            <main class="content">
             <section class="profile">
               <div class="profile__all-information">
                   <img src="./images/image.jpg" class="profile__avatar" alt="аватарка профиля">
                    <div class="profile__info">
                        <h1 class="profile__title">Жак-Ив Кусто</h1> 
                        <button class="profile__edit-button" type="button" aria-label="Кнопка редактирования">
                        </button>
                        <p class="profile__subtitle">Исследователь океана</p> 
                     </div>
                 </div> 
                <button class="profile__add-button" type="button" aria-label="Кнопка добавить">
                </button>
             </section>
            <section class="elements">
                <article class="element">
                        <img src="./images/by.jpg" class="element__image" alt="Ингушетия">
                        <div class="element__description">
                        <h2 class="element__text">Ингушетия</h2>  
                        <button class="element__button" type="button" aria-label="Нравится">
                        </button>
                        </div>
                </article>
                <article class="element">
                        <img src="./images/dombai.jpeg" class="element__image" alt="Домбай">
                        <div class="element__description">
                            <h2 class="element__text">Домбай</h2>
                            <button class="element__button" type="button" aria-label="Нравится">
                           </button>
                        </div>        
                </article>
                <article class="element">
                    <img src="./images/dagestan.jpg" class="element__image" alt="Дагестан">
                    <div class="element__description">
                        <h2 class="element__text">Дагестан</h2>
                        <button class="element__button" type="button" aria-label="Нравится"></button>
                    </div>
            </article>
                <article class="element">
                        <img src="./images/kuban.jpg" class="element__image" alt="Кубань">
                        <div class="element__description">
                            <h2 class="element__text">Кубань</h2>
                            <button class="element__button" type="button" aria-label="Нравится"></button>
                         </div>
                        
                </article>
                <article class="element">
                        <img src="./images/karachaevsk.png" class="element__image" alt="Карачаевск">
                        <div class="element__description">
                            <h2 class="element__text">Карачаевск</h2>
                            <button class="element__button" type="button" aria-label="Нравится"></button>
                        </div>
                        
                </article>
                <article class="element">
                        <img src="./images/albrus.jpg" class="element__image" alt="Эльбрус">
                        <div class="element__description">
                            <h2 class="element__text">Эльбрус</h2>
                            <button class="element__button" type="button" aria-label="Нравится">
                            </button>
                        </div>
                       
                </article>
                
            </section>
            </main>
         <footer class="footer">
             <p class="footer__info">© 2020 Mesto Russia</p>
         </footer>
         <div class="popup">
                <form class="popup__form" name="Информация о пользователе">
                        <fieldset class="popup__info-text">
                                <button class="popup__close-icon" type="button" aria-label="Кнопка закрытия"></button>
                                <h2 class="popup__heading">Редактировать профиль</h2>
                                <input type="text" class="popup__information popup__information_type_name" placeholder="Имя" name="Имя" value="">
                                <input type="text" class="popup__information popup__information_type_job" placeholder="О себе" name="О себе" value="">
                                <button type="submit" class="popup__submit-button">Сохранить</button>
                              </fieldset>
                            </form>
                    
        </div>
    </div>
        <script src="./scripts/index.js">
        </script>
    </body>
 </html>
